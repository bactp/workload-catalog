apiVersion: v1
kind: ConfigMap
metadata:
  name: ue-config
  namespace: free5gc # kpt-set: ${namespace}
data:
  ue.yaml: |
    supi: 'imsi-001010000000001'  # kpt-set: ${ue-imsi}
    mcc: '001'   # kpt-set: ${plmn-mcc}
    mnc: '01'    # kpt-set: ${plmn-mnc}
    key: '8baf473f2f8fd09487cccbd7097c6862'   # kpt-set: ${ue-key}
    op: '8e27b6af0e692e750f32667a3b14605d'    # kpt-set: ${ue-opc}
    opType: 'OPC'
    amf: '8000'
    imeiSv: '0035609204079514'
    gnbSearchList:
      - 127.0.0.1
    uacAic:
      mps: false
      mcs: false
    uacAcc:
      normalClass: 0
      class11: false
      class12: false
      class13: false
      class14: false
      class15: false
    sessions:
      - type: 'IPv4'
        apn: 'internet'  # kpt-set: ${ue-apn}
        slice:
          sst: 0x01
          sd: 0x010203
    configured-nssai:
      - sst: 0x01
        sd: 0x010203
    default-nssai:
      - sst: 1
        sd: 1
    integrity:
      IA1: true
      IA2: true
      IA3: true
    ciphering:
      EA1: true
      EA2: true
      EA3: true
    integrityMaxRate:
      uplink: 'full'
      downlink: 'full'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ue
  namespace: free5gc # kpt-set: ${namespace}
  labels:
    app: ue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ue
  template:
    metadata:
      labels:
        app: ue
    spec:
      initContainers:
        - name: wait-for-gnb
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until wget -q --spider http://gnb-service:4997 2>/dev/null || nc -z gnb-service 4997 2>/dev/null; do
                echo "Waiting for gNB service to be ready..."
                sleep 5
              done
              echo "gNB service is ready"
      containers:
        - name: ue
          image: towards5gs/ueransim:v3.2.6 # kpt-set: ${image-ueransim}
          command: ["/ueransim/build/nr-ue", "-c", "/ueransim/config/ue.yaml"]
          env:
            - name: GNB_IP
              value: "gnb-service"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          volumeMounts:
            - name: ue-config
              mountPath: /ueransim/config/
      volumes:
        - name: ue-config
          configMap:
            name: ue-config
