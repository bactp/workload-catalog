apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: free5gc-amf-n2
  namespace: free5gc # kpt-set: ${namespace}
spec:
  config: '{
    "cniVersion": "0.3.1",
    "type": "macvlan",
    "master": "ens3",
    "mode": "bridge",
    "ipam": {
      "type": "static",
      "addresses": [
        {
          "address": "192.168.100.10/24"
        }
      ],
      "routes": [
        {
          "dst": "0.0.0.0/0",
          "gw": "192.168.100.1"
        }
      ]
    }
  }'
