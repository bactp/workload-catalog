apiVersion: v1
kind: ConfigMap
metadata:
  name: setters
  annotations:
    config.kubernetes.io/local-config: "true"
data:
  # IP of the edge worker node that fronts Kourier ingress (NodePort externalIPs).
  # If this changes, also update the matching domain key in the config-domain
  # ConfigMap in serving-core.yaml (Knative uses the IP as a literal map key,
  # which apply-setters cannot rewrite).
  edge-node-ip: "192.168.1.57"
