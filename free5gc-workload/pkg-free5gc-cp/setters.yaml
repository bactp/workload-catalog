apiVersion: v1
kind: ConfigMap
metadata:
  name: setters
  annotations:
    config.kubernetes.io/local-config: "true"
data:
  # Namespace
  namespace: free5gc

  # AMF N2 Interface (NGAP over Multus macvlan on ens3)
  amf-n2-ip: 192.168.100.10
  amf-n2-subnet: "24"
  amf-n2-gateway: 192.168.100.1
  amf-n2-nad-master: ens3
  amf-port: "38412"

  # UPF N4 Interface (PFCP — SMF reaches UPF via pod IP or routed N4 subnet)
  upf-n4-ip: 192.168.101.20

  # Core services
  nrf-service-name: nrf-service
  mongodb-uri: mongodb://mongodb:27017

  # PLMN / Cell identity
  plmn-mcc: "001"
  plmn-mnc: "01"
  tac: "1"

  # Slice & DNN
  sst: "1"
  sd: ffffff
  dnn: internet

  # UE IP pool
  ue-subnet: 10.1.0.0/16
  ue-dns: 8.8.8.8

  # AMF identity
  amf-id: cafe00

  # Container images (full path so apply-setters replaces the entire field value)
  image-nrf: free5gc/nrf:v3.4.3
  image-udr: free5gc/udr:v3.4.3
  image-udm: free5gc/udm:v3.4.3
  image-ausf: free5gc/ausf:v3.4.3
  image-amf: free5gc/amf:v3.4.3
  image-smf: free5gc/smf:v3.4.3

  # PVC storage class for MongoDB
  storage-class: standard
